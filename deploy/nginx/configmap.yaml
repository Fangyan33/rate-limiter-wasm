apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-file-server-config
  namespace: default
data:
  # 这里的 key 名称为 default.conf，后面挂载时会用到
  default.conf: |
    server {
        listen       80;
        listen  [::]:80;
        server_name  localhost;

        # 编码设置，防止中文文件名乱码
        charset utf-8;

        location / {
            # 指向容器内的挂载目录
            root   /usr/share/nginx/html/files;
            
            # 开启目录浏览功能
            autoindex on;
            autoindex_exact_size off; # 显示文件大概大小（KB, MB）
            autoindex_localtime on;   # 显示文件修改时间（本地时间）
            
            index  index.html index.htm;
        }

        location /mock/v1/chat/completions {
            default_type application/json;
            return 200 '{"choices":[{"finish_reason":"stop","index":0,"message":{"content":"我是GLM大语言模型，由Z.ai训练开发。我基于海量文本数据学习，能够理解和生成人类语言，回答问题、提供信息和进行对话交流。\n\n我的设计目标是成为一个有用、无害的AI助手，帮助用户解决各种问题。我不断学习和改进，但仍有局限性，有时可能无法完全满足用户需求。\n\n有什么我能帮助你的问题或任务吗？","reasoning_content":"让我仔细思考如何回答这个用户的问题。首先需要明确，用户在询问我的身份，这是一个基础但重要的问题。我应该简洁地介绍自己的核心信息，包括作为GLM大语言模型的基本定位。\n\n接着，要考虑如何让回答更加友好和亲切。用户可能希望了解我能提供什么样的帮助，所以应该强调我的多功能性和服务范围。这包括语言理解、知识问答、创意写作等能力。\n\n同时，要注意表达方式的自然流畅。避免过于技术性的术语，让用户能够轻松理解。可以适当使用一些积极正面的词汇，如\"智能助手\"、\"知识储备\"等，来展现我的专业性和亲和力。\n\n考虑到用户可能对AI技术感兴趣，可以简要提及我的训练基础，但不需要过于详细。重点是让用户知道我是一个能够提供实际帮助的AI助手。\n\n最后，要以开放式的结尾来促进进一步的互动，比如询问用户有什么具体需要帮助的。这样既能保持对话的连续性，又能让用户感受到我的服务态度。","role":"assistant"}}],"created":1773131558,"id":"202603101632338c4a00d1078a4021","model":"glm-4.7-flash","object":"chat.completion","request_id":"202603101632338c4a00d1078a4021","usage":{"completion_tokens":282,"completion_tokens_details":{"reasoning_tokens":202},"prompt_tokens":7,"prompt_tokens_details":{"cached_tokens":3},"total_tokens":289}}';
        }

         location /v1/chat/completions{
            # 后端 HTTPS API 地址
            proxy_pass https://open.bigmodel.cn; 

            rewrite ^(.*)$ /api/paas/v4/chat/completions break;
            proxy_set_header Host open.bigmodel.cn;

            # --- 关键配置 (针对HTTPS后端) ---
            
            # 1. 验证后端服务器的SSL证书 (默认为on)
            # 如果后端是公网正规证书，保持 on 即可。
            # 如果后端是自签名证书，需要改为 off，否则会报 502 错误。
            proxy_ssl_verify off; 
            
            # 2. SNI (Server Name Indication) 支持
            # 很多 HTTPS 服务器依赖 SNI 来返回正确的证书，建议开启
            proxy_ssl_server_name on;

            # 3. 建议明确指定 Host 头
            # 默认情况下，Nginx 会把 Host 设为 proxy_pass 中的域名 (api.example.com)
            # 如果后端对 Host 头敏感，可以用 set_header 修改
            proxy_set_header Host $host; # 或者$proxy_host (后端域名)
            
            # --- 通用代理配置 ---
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时设置
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
         
         }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }



    