apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-file-server-config
  namespace: default
data:
  # 这里的 key 名称为 default.conf，后面挂载时会用到
  default.conf: |
    server {
        listen       80;
        listen  [::]:80;
        server_name  localhost;

        # 编码设置，防止中文文件名乱码
        charset utf-8;

        location / {
            # 指向容器内的挂载目录
            root   /usr/share/nginx/html/files;
            
            # 开启目录浏览功能
            autoindex on;
            autoindex_exact_size off; # 显示文件大概大小（KB, MB）
            autoindex_localtime on;   # 显示文件修改时间（本地时间）
            
            index  index.html index.htm;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }