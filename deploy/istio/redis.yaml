apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
type: Opaque
stringData:
  # 这里设置 Redis 的密码，请修改为你自己的强密码
  redis-password: "YourStrongPassword123"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi  # 申请 1GB 存储空间，根据需要调整
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:8.6.1  # 使用轻量级的 Alpine 版本
        ports:
        - containerPort: 6379
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: redis-password
        # 启动命令：开启持久化(AOF)并加载密码
        command: ["redis-server"]
        args: ["--appendonly yes", "--requirepass $(REDIS_PASSWORD)"]
        volumeMounts:
        - name: redis-data
          mountPath: /data
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379       # Service 暴露的端口
      targetPort: 6379 # 容器内部端口
  type: ClusterIP      # 仅集群内部访问，如需外部访问可改为 NodePort 或 LoadBalancer
