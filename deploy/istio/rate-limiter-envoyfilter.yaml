apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: rate-limiter-wasm
  namespace: istio-system
spec:
  workloadSelector:
    labels:
      app: istio-ingressgateway
  configPatches:
    - applyTo: CLUSTER
      match:
        context: GATEWAY
      patch:
        operation: ADD
        value:
          name: counter-service
          type: STRICT_DNS
          connect_timeout: 1s
          load_assignment:
            cluster_name: counter-service
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: counter-service.default.svc.cluster.local
                          port_value: 8080
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.router
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.wasm
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.wasm.v3.Wasm
            config:
              name: rate-limiter-wasm
              root_id: rate-limiter-root
              vm_config:
                vm_id: rate-limiter-vm
                runtime: envoy.wasm.runtime.v8
                code:
                  remote:
                    http_uri:
                      uri: http://nginx-file-server-svc.default.svc.cluster.local/rate-limiter.wasm
                      cluster: outbound|80||nginx-file-server-svc.default.svc.cluster.local
                      timeout: 10s
                    sha256: a734d48344aae1a4f0656b33260dcd73b4ea905815f84cd7d329d24330d01a43
              configuration:
                "@type": type.googleapis.com/google.protobuf.StringValue
                value: |
                  domains:
                    - llm-demo.local
                  rate_limits:
                    - api_key: 9353c0ddee1b497f92ac0605bbd97dec.
                      max_concurrent: 2
                    - api_key: key_premium_001
                      max_concurrent: 5
                  distributed_limit:
                    enabled: true
                    backend: counter_service
                    counter_service:
                      cluster: counter-service
                      acquire_path: /acquire
                      release_path: /release
                      timeout_ms: 5000
                      lease_ttl_ms: 30000
                  error_response:
                    status_code: 429
                    message: Rate limit exceeded
