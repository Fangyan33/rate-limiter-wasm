apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: rate-limiter-wasm
  namespace: istio-system
spec:
  workloadSelector:
    labels:
      app: istio-ingressgateway
  configPatches:
    - applyTo: CLUSTER
      match:
        context: GATEWAY
      patch:
        operation: ADD
        value:
          name: counter-service
          type: STRICT_DNS
          connect_timeout: 1s
          load_assignment:
            cluster_name: counter-service
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: counter-service.default.svc.cluster.local
                          port_value: 8080
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.router
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.wasm
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.wasm.v3.Wasm
            config:
              name: rate-limiter-wasm
              root_id: rate-limiter-root
              vm_config:
                vm_id: rate-limiter-vm
                runtime: envoy.wasm.runtime.v8
                code:
                  remote:
                    http_uri:
                      uri: http://nginx-file-server-svc.default.svc.cluster.local/rate-limiter.wasm
                      cluster: outbound|80||nginx-file-server-svc.default.svc.cluster.local
                      timeout: 10s
                    sha256: b4eb0355bb280fca25bd4f7bc5f4cf2590b78eeb3bc0294ea12db28b61071f01
              configuration:
                "@type": type.googleapis.com/google.protobuf.StringValue
                value: |
                  domains:
                    - llm-demo.local
                  token_statistics:
                    enabled: true
                    inject_stream_usage: true
                    metric_key_limit: 5000

                  distributed_limit:
                    enabled: true
                    backend: counter_service
                    counter_service:
                      cluster: counter-service
                      acquire_path: /acquire
                      release_path: /release
                      timeout_ms: 5000
                      lease_ttl_ms: 30000

                  error_response:
                    status_code: 429
                    message: Rate limit exceeded
