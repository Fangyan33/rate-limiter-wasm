apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: rate-limiter-wasm
  namespace: istio-system
spec:
  workloadSelector:
    labels:
      app: istio-ingressgateway
  configPatches:
    - applyTo: CLUSTER
      match:
        context: GATEWAY
      patch:
        operation: ADD
        value:
          name: rate-limiter-wasm-artifact
          type: STRICT_DNS
          connect_timeout: 5s
          load_assignment:
            cluster_name: rate-limiter-wasm-artifact
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: nginx-file-server-svc.default.svc.cluster.local
                          port_value: 80
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.router
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.wasm
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.wasm.v3.Wasm
            config:
              name: rate-limiter-wasm
              root_id: rate-limiter-root
              vm_config:
                vm_id: rate-limiter-vm
                runtime: envoy.wasm.runtime.v8
                code:
                  remote:
                    http_uri:
                      uri: https://nginx-file-server-svc.default.svc.cluster.local/rate-limiter.wasm
                      cluster: rate-limiter-wasm-artifact
                      timeout: 10s
              configuration:
                "@type": type.googleapis.com/google.protobuf.StringValue
                value: |
                  domains:
                    - api.example.com
                  rate_limits:
                    - api_key: key_basic_001
                      max_concurrent: 2
                    - api_key: key_premium_001
                      max_concurrent: 5
                  distributed_limit:
                    enabled: true
                    backend: counter_service
                    counter_service:
                      cluster: ratelimit-service
                      timeout_ms: 200
                  error_response:
                    status_code: 429
                    message: Rate limit exceeded
